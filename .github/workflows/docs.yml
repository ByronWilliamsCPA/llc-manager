# Documentation Workflow
# Builds and deploys MkDocs documentation to GitHub Pages.
#
# Features:
#   - MkDocs Material theme build
#   - GitHub Pages deployment on push to main
#   - PR preview builds
name: Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write  # For GitHub Pages deployment
  pages: write
  id-token: write

# Uses org-level reusable workflow
jobs:
  docs:
    name: Build & Deploy Docs
    uses: ByronWilliamsCPA/.github/.github/workflows/python-docs.yml@8fbdb549a33a93520e7b431d8d9b8d5e9478674a # main
    with:
      python-version: '3.12'
      deploy-to-pages: >-
        ${{
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        }}
