# OpenSSF Scorecard for LLC Manager
# Security posture assessment and supply chain security validation.
#
# Dashboard: https://securityscorecards.dev/viewer/?uri=github.com/ByronWilliamsCPA/llc-manager
# Documentation: https://github.com/ossf/scorecard
#
# publish-results is false: scorecard-action OIDC publication does not work
# from an org-level reusable workflow callsite. The OIDC token's repository
# claim mismatches when the action runs in the org context rather than the
# calling repo context. Re-enable once the action supports this topology.
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Tuesdays at 21:21 UTC
    - cron: '21 21 * * 2'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

# Uses org-level reusable workflow
jobs:
  scorecard:
    name: Scorecard Analysis
    uses: ByronWilliamsCPA/.github/.github/workflows/python-scorecard.yml@275f7d71815712a3b5221e60237b6e5456e92d76  # main
    with:
      publish-results: false
      upload-sarif: true
      artifact-retention-days: 5
    secrets:
      SCORECARD_TOKEN: ${{ secrets.SCORECARD_TOKEN }}
