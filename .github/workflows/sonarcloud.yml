# LLC Manager - SonarCloud Analysis
# Continuous code quality and security analysis
#
# Features:
#   - Code quality metrics (bugs, code smells, technical debt)
#   - Security vulnerability detection (OWASP Top 10)
#   - Test coverage tracking
#   - Quality gate enforcement
#   - Pull request decoration
#
# SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_llc-manager
# Documentation: https://docs.sonarsource.com/sonarqube-cloud/
#
# Note: This workflow requires SONAR_TOKEN secret to be configured.
# If not configured, the workflow will skip with a helpful message.

name: SonarCloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Check if SONAR_TOKEN is configured before running analysis
  check-secrets:
    name: Check Configuration
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Check for SONAR_TOKEN
        id: check
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "has-token=true" >> $GITHUB_OUTPUT
            echo "::notice::SONAR_TOKEN is configured. SonarCloud analysis will run."
          else
            echo "has-token=false" >> $GITHUB_OUTPUT
            echo "::warning::SONAR_TOKEN is not configured. Skipping SonarCloud analysis."
            echo "To enable SonarCloud:"
            echo "1. Create a project at https://sonarcloud.io"
            echo "2. Generate a token at https://sonarcloud.io/account/security"
            echo "3. Add SONAR_TOKEN as a repository secret"
          fi

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has-token == 'true'
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write  # Required for SonarCloud PR decoration

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Disable shallow clone for better analysis

      - name: Check for Python code
        id: check-code
        run: |
          if find src -name '*.py' -type f 2>/dev/null | grep -q .; then
            echo "has-code=true" >> $GITHUB_OUTPUT
          else
            echo "has-code=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No Python source files found. Skipping SonarCloud analysis." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set up Python
        if: steps.check-code.outputs.has-code == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install UV
        if: steps.check-code.outputs.has-code == 'true'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        if: steps.check-code.outputs.has-code == 'true'
        run: |
          uv sync --frozen --all-extras

      - name: Run tests with coverage
        if: steps.check-code.outputs.has-code == 'true'
        # Continue on non-zero exit so SonarCloud can publish real partial
        # coverage instead of masking it with a fake empty report. The Verify
        # step below still hard-fails if coverage.xml was never written
        # (which would happen only on a pytest-level crash, not on test or
        # threshold failures).
        continue-on-error: true
        run: |
          uv run pytest \
            --cov=src/llc_manager \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --cov-branch \
            -v

      - name: Verify coverage report
        id: verify_coverage
        if: steps.check-code.outputs.has-code == 'true'
        continue-on-error: true
        run: |
          if [ ! -f coverage.xml ]; then
            echo "::error::Coverage report missing; blocking SonarCloud analysis."
            exit 1
          else
            echo "✓ Coverage report generated successfully"
            ls -lh coverage.xml
          fi


      - name: Fail if coverage verification failed
        if: steps.verify_coverage.outcome == 'failure'
        run: exit 1

      - name: SonarCloud Scan
        if: steps.check-code.outputs.has-code == 'true'
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # SonarCloud authentication
        with:
          scannerVersion: 8.1.0.6389
          args: >
            -Dsonar.organization=williaby
            -Dsonar.projectKey=ByronWilliamsCPA_llc-manager
            -Dsonar.python.version=3.12

      - name: Check Quality Gate
        if: steps.check-code.outputs.has-code == 'true'
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate Summary
        if: always()
        run: |
          echo "### SonarCloud Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_llc-manager" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Metrics analyzed:**" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality (bugs, code smells, maintainability)" >> $GITHUB_STEP_SUMMARY
          echo "- Security (vulnerabilities, security hotspots)" >> $GITHUB_STEP_SUMMARY
          echo "- Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Code Duplication" >> $GITHUB_STEP_SUMMARY
          echo "- Technical Debt" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: coverage-sonarcloud
          path: |
            coverage.xml
            .coverage
          retention-days: 7
