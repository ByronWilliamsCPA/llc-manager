# LLC Manager - SonarCloud Analysis
#
# Delegates to org reusable workflow:
#   ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml
#
# SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_llc-manager
# Documentation: https://docs.sonarsource.com/sonarqube-cloud/

name: SonarCloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarcloud:
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml@6bad2f898be1d387b8424e9deddefa519674cb19 # main
    permissions:
      contents: read
      pull-requests: write  # Required for PR decoration; reusable workflows cannot escalate beyond this
    with:
      sonar-organization: 'williaby'
      sonar-project-key: 'ByronWilliamsCPA_llc-manager'
      python-version: '3.12'
      source-directory: 'src'
      coverage-paths: 'coverage.xml'
      fail-on-quality-gate: ${{ github.event_name != 'pull_request' }}
      skip-if-no-token: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
