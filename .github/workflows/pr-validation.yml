# PR Validation for LLC Manager
# Supplemental pull request checks not covered by the main CI workflow.
#
# The ci.yml workflow calls python-ci.yml (tests, lint, type-check, security).
# This workflow adds PR-specific checks: changelog, link validation, and
# dead code detection via vulture.
name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - develop

# Cancel in-progress runs for same PR
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ==========================================================================
  # Org-Level Supplemental PR Checks
  # ==========================================================================
  supplemental-checks:
    name: Supplemental Checks
    uses: ByronWilliamsCPA/.github/.github/workflows/python-supplemental-checks.yml@5cce3ccfc200033cc0448b7c5684f40d891f5bbc # main
    with:
      enable-changelog-check: true
      enable-link-check: true
      enable-cruft-check: false
      enable-automerge: false
    secrets: inherit

  # ==========================================================================
  # Additional Checks (Project-Specific)
  # ==========================================================================

  # Dead Code Detection with Vulture
  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ".uv-cache"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run vulture
        run: |
          echo "## Dead Code Report" >> $GITHUB_STEP_SUMMARY
          uv run vulture src/ --min-confidence 90 | tee vulture-report.txt || true
          if [ -s vulture-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat vulture-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::Potential dead code detected. Review vulture report."
          else
            echo "No dead code detected with 90% confidence." >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================================================
  # Validation Summary
  # ==========================================================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [supplemental-checks, dead-code]
    if: always()
    steps:
      - name: Check validation results
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.supplemental-checks.result }}" == "success" ]; then
            echo "Supplemental Checks: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Supplemental Checks: ${{ needs.supplemental-checks.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.dead-code.result }}" == "success" ]; then
            echo "Dead Code Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Dead Code Check: ${{ needs.dead-code.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.supplemental-checks.result }}" == "failure" ]; then
            echo ""
            echo "Supplemental checks failed. Please review and fix issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo ""
          echo "All validation checks passed!" >> $GITHUB_STEP_SUMMARY
