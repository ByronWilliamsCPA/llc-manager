# Codecov Configuration for LLC Manager
# A web application for managing LLC entities, tracking compliance dates, ownership structures, and associated documentation

# Security: Only read configuration from main branch
codecov:
  strict_yaml_branch: main
  require_ci_to_pass: yes
  max_report_age: 12h

# Coverage targets and thresholds
coverage:
  precision: 2
  round: down
  range: 70..95

  status:
    project:
      default:
        # Line coverage per global CLAUDE.md: 80%
        # Branch coverage target 70% is enforced at the coverage tool level;
        # see [tool.coverage.report] fail_under and --cov-branch in pyproject.toml.
        target: 80%
        threshold: 2%
        if_ci_failed: error

    patch:
      default:
        # Patch coverage per global CLAUDE.md: 90%
        target: 90%
        threshold: 5%
        if_ci_failed: error

# Multi-flag tracking for test types
# See: https://docs.codecov.com/docs/flags
flags:
  unit:
    # Unit tests should have highest coverage target
    carryforward: true
    paths:
      - src/llc_manager/

  integration:
    # Integration tests may have lower coverage
    carryforward: true
    paths:
      - src/llc_manager/

  security:
    # Security-focused tests
    carryforward: true
    paths:
      - src/llc_manager/

  # Python version flags (CI workflow uploads)
  python-3.10:
    carryforward: true
  python-3.11:
    carryforward: true
  python-3.12:
    carryforward: true
  python-3.13:
    carryforward: true
  python-3.14:
    carryforward: true

# Flag-specific coverage targets
# Enables different thresholds per test type
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: auto
        threshold: 2%

  individual_flags:
    - name: unit
      behavior: default
      statuses:
        - type: project
          target: 85%
          threshold: 2%
          if_ci_failed: error
        - type: patch
          target: 90%
          threshold: 5%

    - name: integration
      behavior: default
      statuses:
        - type: project
          target: 70%
          threshold: 3%
          if_ci_failed: error
        - type: patch
          target: 70%
          threshold: 5%

    - name: security
      behavior: default
      statuses:
        - type: project
          target: auto
          threshold: 2%
        - type: patch
          target: 80%
          threshold: 5%

# Component-based coverage tracking
component_management:
  individual_components:
    # Core module
    - component_id: core
      name: Core Module
      paths:
        - src/llc_manager/**

    # Critical-path component per global CLAUDE.md: 90% target.
    # Covers modules whose failure has outsized blast radius: auth/security,
    # DB sessions, request middleware, core exception handling.
    - component_id: critical
      name: Critical Path
      paths:
        - src/llc_manager/core/exceptions.py
        - src/llc_manager/core/config.py
        - src/llc_manager/db/session.py
        - src/llc_manager/db/base.py
        - src/llc_manager/middleware/security.py
        - src/llc_manager/middleware/correlation.py
      statuses:
        - type: project
          target: 90%
          threshold: 2%
          if_ci_failed: error
        - type: patch
          target: 90%
          threshold: 2%
          if_ci_failed: error

# Paths to ignore from coverage
ignore:
  # Test directories
  - "tests/**"
  - "**/*_test.py"
  - "**/test_*.py"

  # Validation scripts (not production code)
  - "validation/**"

  # Python cache and compiled files
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/*.pyd"
  - "**/*.so"
  - "**/*.dll"
  - "**/*.dylib"

  # Virtual environments
  - ".env/**"
  - ".venv/**"
  - "env/**"
  - "venv/**"
  - "ENV/**"
  - "env.bak/**"
  - "venv.bak/**"

  # IDE and editor files
  - ".vscode/**"
  - ".idea/**"
  - "*.swp"
  - "*.swo"
  - "*~"
  - ".DS_Store"

  # Build and distribution
  - "dist/**"
  - "build/**"
  - "*.egg-info/**"
  - ".eggs/**"
  - "*.egg"
  - "wheels/**"

  # Documentation
  - "docs/**"
  - "*.md"
  - "*.rst"

  # Configuration files
  - "*.toml"
  - "*.cfg"
  - "*.ini"
  - "*.yaml"
  - "*.yml"

  # Security and secrets
  - ".secrets*"
  - ".age"
  - ".sops.*"
  - "*.key"
  - "*.pem"

  # Dependency files
  - "poetry.lock"
  - "requirements*.txt"
  - "Pipfile.lock"

  # Git and CI
  - ".git/**"
  - ".github/**"
  - ".gitignore"
  - ".gitattributes"

  # Logs and temporary files
  - "logs/**"
  - "*.log"
  - ".pytest_cache/**"
  - ".mypy_cache/**"
  - ".ruff_cache/**"
  - "htmlcov/**"
  - ".coverage*"
  - "coverage.xml"

  # Temporary cleanup directory
  - "tmp_cleanup/**"

# Pull request comment configuration
comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
  require_base: yes
  require_head: yes

github_checks:
  annotations: true
